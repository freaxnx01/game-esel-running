<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esel vs. Karotte - Das große Rennen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🐴 Esel vs. Karotte 🥕</h1>

        <div class="info-panel">
            <div class="player-info">
                <h3>Spieler 1 (Oben)</h3>
                <p>Leertaste drücken</p>
                <p>Punkte: <span id="score1">0</span></p>
            </div>
            <div class="game-status">
                <p id="status">Drücke LEERTASTE oder ENTER zum Starten!</p>
            </div>
            <div class="player-info">
                <h3>Spieler 2 (Unten)</h3>
                <p>Enter drücken</p>
                <p>Punkte: <span id="score2">0</span></p>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="controls">
            <p><strong>Steuerung:</strong></p>
            <p>🎮 Spieler 1: Leertaste (Space)</p>
            <p>🎮 Spieler 2: Enter-Taste</p>
            <p>⏸️ Pause: P</p>
            <p>🔄 Neustart: R</p>
        </div>
    </div>

    <script src="game.js"></script>
